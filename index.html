<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Young Desert | Official Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
    <div class="logo">YOUNG DESERT</div>

    <nav class="nav-links">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
    </nav>

    <div class="nav-icons">
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span class="cart-count-val">0</span>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </div>
</header>

<!-- ================= MOBILE MENU ================= -->
<div id="mobile-menu" class="mobile-menu">
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#" onclick="openCartFromMenu()">Cart (<span class="cart-count-val">0</span>)</a>
</div>

<!-- ================= PRODUCTS GRID ================= -->
<main class="main-container">
    <h1 class="section-title">FAITH COLLECTION</h1>
    <div id="product-container" class="product-grid"></div>
</main>

<!-- ================= CART OVERLAY ================= -->
<div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>

<!-- ================= CART SIDEBAR ================= -->
<div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <button onclick="toggleCart()">✕</button>
    </div>

    <div id="cart-items-container" class="cart-items"></div>

    <div class="cart-footer">
        <h3>Total: <span id="cart-total-price">$0.00</span></h3>
        <button class="checkout-btn" onclick="handleCheckout()">Checkout</button>
    </div>
</div>

<!-- ================= NEWSLETTER MODAL ================= -->
<div id="newsletter-overlay" class="newsletter-overlay">
    <div class="newsletter-modal">
        <button id="close-newsletter" class="close-newsletter">✕</button>
        <h2>JOIN THE DESERT</h2>
        <p>Get exclusive drops & 10% off.</p>

        <form id="newsletter-form">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">JOIN</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
